name: Build Personal VSIX

on:
  workflow_dispatch: # Allows you to run this manually from the Actions tab
  push:
    branches:
      - main # Optional: builds every time you push to main

jobs:
  build-extension:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        # This reuses your existing setup action from the repo

      - name: Create .env file
        run: echo "POSTHOG_API_KEY=${{ secrets.POSTHOG_API_KEY }}" >> .env

      - name: Package Extension
        run: |
          # Get version from package.json for the filename
          current_package_version=$(node -p "require('./src/package.json').version")
          
          # Run the turbo build and packaging script
          pnpm vsix
          
          echo "VSIX created at bin/roo-cline-${current_package_version}.vsix"

      - name: Upload VSIX Artifact
        uses: actions/upload-artifact@v4
        with:
          name: roo-code-vsix
          path: bin/*.vsix
          if-no-files-found: error
